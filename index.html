<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GC-Wiki | Home</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="main-wrapper">
    <h1 class="section-title">Welcome to the GC-Wiki</h1>

    <div id="cardContainer" class="card-grid"></div>
  </main>

<script>
/* ============================= */
/* EDIT THIS LIST TO ADD PAGES  */
/* ============================= */

const pages = [
  {
    url: "useful-utilities.html",
    title: "Useful Utilities",
    description: "Some Utilities that may be useful on your Kindle, not all are made by me",
    category: " "
  },
  {
    url: "quick.html",
    title: "QuickLinuxes",
    description: "Applications to install, launch, and uninstall certain Linux distros on your Kindle.",
    category: " "
  },
  {
    url: "quickalpine.html",
    title: "QuickAlpine",
    description: "Quickly and easily install, uninstall, and launch Alpine Linux on your Kindle.",
    category: " "
  },
  {
    url: "https://gc-bio.vercel.app/social/",
    title: "Contact",
    description: " ",
    category: " "
  }
];

/* ============================= */
/* AUTO CARD GENERATOR          */
/* ============================= */

const container = document.getElementById("cardContainer");

pages.forEach(page => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <h2 class="card-title">${page.title}</h2>
    <p class="card-desc">${page.description}</p>
    <div class="card-meta">${page.category}</div>
    <div class="card-links">
      <a href="${page.url}">Open →</a>
    </div>
  `;

  container.appendChild(card);
});
</script>

</body>
</html>
